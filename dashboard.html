<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Cannes 2026 · Schedule Builder</title>
<style>
  :root {
    --bg: #0d0d10;
    --surface: #17171c;
    --surface-2: #1f1f26;
    --border: #2b2b33;
    --text: #f0f0f0;
    --muted: #8a8a94;
    --accent: #ffcc33;
    --accent-2: #ff5576;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
    --gala: #c084fc;
    --comp: #60a5fa;
    --ucr: #34d399;
    --df: #fbbf24;
    --premiere: #f472b6;
    --ooc: #fb923c;
    --mid: #a78bfa;
    --semaine: #2dd4bf;
    --special: #94a3b8;
    --shorts: #facc15;
    --other: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
  }
  header {
    padding: 20px 32px 0;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #18181f 0%, #0d0d10 100%);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  h1 {
    margin: 0 0 4px 0;
    font-size: 22px;
    letter-spacing: 0.5px;
  }
  h1 span.accent { color: var(--accent); }
  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .main-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: -1px;
  }
  .main-tab {
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: none;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    border-radius: 8px 8px 0 0;
  }
  .main-tab:hover { color: var(--text); }
  .main-tab.active {
    background: var(--bg);
    color: var(--accent);
    border-color: var(--border);
  }
  .day-tabs {
    display: flex;
    gap: 4px;
    margin: 14px 0 0;
    padding-bottom: 14px;
    flex-wrap: wrap;
  }
  .day-tab {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
  }
  .day-tab:hover { border-color: var(--accent); }
  .day-tab.active {
    background: var(--accent);
    color: #0d0d10;
    border-color: var(--accent);
  }
  .day-tab .cnt {
    opacity: 0.6;
    margin-left: 6px;
    font-size: 10px;
  }
  main { padding: 24px 32px 80px; }

  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 28px;
    align-items: center;
    flex-wrap: wrap;
  }
  .summary .metric { display: flex; flex-direction: column; gap: 2px; }
  .summary .metric b { font-size: 18px; color: var(--accent); }
  .summary .metric small {
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .summary .spacer { flex: 1; }
  .summary button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .summary button:hover { border-color: var(--accent); }

  .slot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .slot-header {
    padding: 12px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .slot-header .slot-time {
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .slot-header .slot-main { flex: 1; font-size: 15px; font-weight: 600; }
  .slot-header .gala-tag {
    margin-left: 10px;
    background: var(--gala);
    color: #0d0d10;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .slot-header .slot-time-range { color: var(--muted); font-size: 12px; }
  .slot-body { padding: 12px 18px 16px; }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.1s;
  }
  .option:hover { border-color: var(--accent); }
  .option.selected {
    border-color: var(--accent);
    background: #2a2516;
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .option.backup { opacity: 0.85; }
  .option .opt-header {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }
  .option .title {
    font-weight: 600; font-size: 14px; line-height: 1.25;
  }
  .option .score-badge {
    flex-shrink: 0;
    background: var(--surface-2);
    color: var(--text);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
  }
  .option .score-badge.s-peak { background: #22c55e; color: #0d0d10; }
  .option .score-badge.s-high { background: var(--good); color: #0d0d10; }
  .option .score-badge.s-mid { background: var(--warn); color: #0d0d10; }
  .option .score-badge.s-ok { background: var(--surface-2); color: var(--text); }
  .option .score-badge.s-low { background: #374151; color: var(--muted); }
  .option .meta-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .option .director { color: var(--text); opacity: 0.9; font-size: 12px; }
  .section-chip {
    padding: 1px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .section-chip.Competition { background: var(--comp); color: #0d0d10; }
  .section-chip.UCR { background: var(--ucr); color: #0d0d10; }
  .section-chip.DF { background: var(--df); color: #0d0d10; }
  .section-chip.Cannes-Premiere { background: var(--premiere); color: #0d0d10; }
  .section-chip.Out-of-Competition { background: var(--ooc); color: #0d0d10; }
  .section-chip.Midnight-Screenings { background: var(--mid); color: #0d0d10; }
  .section-chip.Semaine { background: var(--semaine); color: #0d0d10; }
  .section-chip.Special { background: var(--special); color: #0d0d10; }
  .section-chip.Shorts-Competition { background: var(--shorts); color: #0d0d10; }
  .section-chip.Other { background: var(--other); color: #0d0d10; }
  .option .times { font-size: 12px; color: var(--text); font-weight: 500; }
  .option .venue { font-size: 11px; color: var(--muted); }
  .option.gala .times::before { content: '🎩 '; }
  .option.selected .radio-indicator::before { content: '●'; color: var(--accent); }
  .radio-indicator {
    position: absolute; top: 10px; right: 10px;
    font-size: 12px; color: var(--muted);
  }
  .radio-indicator::before { content: '○'; }

  .override-toggle {
    margin-top: 12px;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    width: 100%;
    text-align: left;
  }
  .override-toggle:hover { color: var(--text); border-color: var(--muted); }
  .override-panel {
    display: none;
    margin-top: 12px;
    padding: 12px;
    background: var(--surface-2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .override-panel.open { display: block; }
  .override-panel h4 {
    margin: 0 0 8px 0;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .override-panel select {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 500;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-overlay.open { display: block; }
  .modal {
    max-width: 640px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    position: relative;
  }
  .modal .close {
    position: absolute; top: 14px; right: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px; line-height: 1;
  }
  .modal h2 { margin: 0 0 4px 0; font-size: 22px; }
  .modal .director-line { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
  .modal .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .modal .chip {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    color: var(--muted);
  }
  .modal h4 {
    margin: 16px 0 6px 0; font-size: 12px;
    text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px;
  }
  .modal p { margin: 0; font-size: 14px; line-height: 1.55; }
  .modal .screenings-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .modal .screenings-list .sc {
    font-size: 12px;
    background: var(--surface-2);
    padding: 6px 10px;
    border-radius: 6px;
    display: flex; justify-content: space-between;
  }
  .modal .screenings-list .sc.mine {
    background: #2a2516;
    border: 1px solid var(--accent);
  }
  .modal .score-row { display: flex; gap: 16px; margin: 8px 0 14px 0; }
  .modal .score-cell {
    flex: 1;
    background: var(--surface-2);
    padding: 10px 14px;
    border-radius: 8px;
  }
  .modal .score-cell b { font-size: 20px; color: var(--accent); display: block; }
  .modal .score-cell small {
    color: var(--muted); font-size: 10px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .legend {
    display: flex; gap: 12px; font-size: 11px;
    color: var(--muted); margin-top: 8px; flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend span::before {
    content: ''; width: 10px; height: 10px; border-radius: 50%;
    display: inline-block;
  }
  .legend .l-comp::before { background: var(--comp); }
  .legend .l-ucr::before { background: var(--ucr); }
  .legend .l-df::before { background: var(--df); }
  .legend .l-prem::before { background: var(--premiere); }
  .legend .l-mid::before { background: var(--mid); }
  .legend .l-gala::before { background: var(--gala); }
  .no-films { color: var(--muted); padding: 40px 20px; text-align: center; }

  /* Summary tab */
  .summary-tab .day-block {
    margin-bottom: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .summary-tab .day-block-header {
    padding: 12px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .summary-tab .day-block-header .date-label {
    font-size: 15px;
    color: var(--accent);
  }
  .summary-tab .day-block-header .day-stats {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }
  .summary-tab .pick-row {
    padding: 10px 18px;
    display: flex;
    gap: 14px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .summary-tab .pick-row:last-child { border-bottom: none; }
  .summary-tab .pick-row:hover { background: var(--surface-2); cursor: pointer; }
  .summary-tab .pick-row .pt-time {
    min-width: 130px; color: var(--muted); font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .summary-tab .pick-row .pt-title {
    flex: 1; font-weight: 500;
  }
  .summary-tab .pick-row .pt-director {
    color: var(--muted); font-size: 12px;
  }
  .summary-tab .pick-row.gala { background: #1b1524; }
  .summary-tab .pick-row.gala:hover { background: #251b30; }

  /* Competition tracker */
  .comp-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .comp-table th, .comp-table td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .comp-table th {
    background: var(--surface-2);
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .comp-table tr:last-child td { border-bottom: none; }
  .comp-table tr.status-going td { background: #12231a; }
  .comp-table tr.status-missed td { color: var(--muted); opacity: 0.8; }
  .comp-table tr:hover td { background: var(--surface-2); }
  .status-pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .status-pill.going { background: var(--good); color: #0d0d10; }
  .status-pill.missed { background: #374151; color: var(--muted); }

  /* Lookup tab */
  .lookup-search {
    position: relative;
    margin-bottom: 20px;
  }
  .lookup-search input {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px 14px 44px;
    font-size: 15px;
    font-family: inherit;
  }
  .lookup-search input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .lookup-search::before {
    content: '🔍';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.6;
  }
  .lookup-results {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }
  .lookup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
  }
  .lookup-card:hover { border-color: var(--accent); }
  .lookup-card .lc-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 2px;
  }
  .lookup-card .lc-director {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
  }
  .lookup-card .lc-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 8px;
  }
  .lookup-card .lc-screenings {
    font-size: 11px;
    color: var(--muted);
  }
  .lookup-card .lc-screenings b {
    color: var(--text);
    font-weight: 500;
  }
  .lookup-empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>Cannes <span class="accent">2026</span> · Schedule Builder</h1>
  <div class="tagline">Personalised picks for Daniel. Main + backups per slot, custom override any screening.</div>
  <div class="main-tabs">
    <button class="main-tab active" data-tab="planner">🗓 Planner</button>
    <button class="main-tab" data-tab="summary">📋 My Plan</button>
    <button class="main-tab" data-tab="competition">🏆 Competition Tracker</button>
    <button class="main-tab" data-tab="lookup">🔍 Lookup</button>
    <button class="main-tab" data-tab="watchlist">👁 Watchlist</button>
    <button class="main-tab" data-tab="control">⚙️ Control</button>
  </div>
  <div id="sub-nav"></div>
</header>

<main id="main-content"></main>

<div class="modal-overlay" id="modal"><div class="modal" id="modal-content"></div></div>

<script>
const DATA = __DATA__;

const state = {
  tab: 'planner',
  day: Object.keys(DATA.schedule).sort()[0],
  selection: JSON.parse(localStorage.getItem('cannes_selection') || '{}'),
  lookup: '',
};

function persistSelection() {
  localStorage.setItem('cannes_selection', JSON.stringify(state.selection));
}

function fmtTime(m) {
  if (m == null) return '';
  const isNext = m >= 24*60;
  const mm = m % (24*60);
  let h = Math.floor(mm / 60), mins = mm % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  let disp = h % 12; if (disp === 0) disp = 12;
  return `${disp}:${mins.toString().padStart(2,'0')}${ampm}${isNext ? ' (+1)' : ''}`;
}
function fmtDate(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}
function fmtDateLong(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

function scoreClass(s) {
  if (s >= 9) return 's-peak';
  if (s >= 7.5) return 's-high';
  if (s >= 6) return 's-mid';
  if (s >= 4.5) return 's-ok';
  return 's-low';
}
function sectionClass(tag) { return (tag || 'Other').replace(/[^A-Za-z]/g, '-'); }
function screeningById(day, id) { return DATA.schedule[day].find(x => x.id === id); }
function slotKey(day, index) { return `${day}#${index}`; }
function pickedForSlot(day, slot, slotIndex) {
  return state.selection[slotKey(day, slotIndex)] || slot.main_id;
}
function normTitle(t) {
  return (t || '').toUpperCase()
    .replace(/…/g, '')
    .replace(/\s*\(.*?\)\s*/g, ' ')
    .replace(/\s*\([^)]*$/g, '')
    .replace(/[''']$/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// ============ Collect all selected screenings across all days =============
function allSelectedScreenings() {
  const picks = [];
  for (const date of Object.keys(DATA.slots)) {
    DATA.slots[date].forEach((sl, i) => {
      const s = screeningById(date, pickedForSlot(date, sl, i));
      if (s) picks.push({ date, screening: s, slotIndex: i });
    });
  }
  return picks;
}

// ============ Main tab navigation =============
function setTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.main-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  render();
}
document.querySelectorAll('.main-tab').forEach(t => {
  t.onclick = () => setTab(t.dataset.tab);
});

// ============ Planner tab =============
function renderDayTabs() {
  const container = document.getElementById('sub-nav');
  container.innerHTML = '<div class="day-tabs" id="day-tabs"></div>';
  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = '';
  for (const d of Object.keys(DATA.schedule).sort()) {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d === state.day ? ' active' : '');
    const cnt = DATA.slots[d].length;
    btn.innerHTML = `${fmtDate(d)}<span class="cnt">${cnt}</span>`;
    btn.onclick = () => { state.day = d; renderDayTabs(); renderPlanner(); window.scrollTo(0, 0); };
    tabs.appendChild(btn);
  }
}

function renderPlannerSummary() {
  const day = state.day;
  const slots = DATA.slots[day];
  const selected = slots.map((sl, i) => screeningById(day, pickedForSlot(day, sl, i)));
  const n = selected.length;
  const galas = selected.filter(s => s && s.is_gala).length;
  const comp = selected.filter(s => s && s.meta.section_tag === 'Competition').length;
  const avg = selected.reduce((a, s) => a + (s && s.meta.score || 0), 0) / (n || 1);
  return `
    <div class="summary">
      <div class="metric"><b>${n}</b><small>films today</small></div>
      <div class="metric"><b>${galas}</b><small>galas 🎩</small></div>
      <div class="metric"><b>${comp}</b><small>competition</small></div>
      <div class="metric"><b>${avg.toFixed(1)}</b><small>avg score</small></div>
      <div class="spacer"></div>
      <button onclick="resetDaySelections()">Reset day defaults</button>
      <button onclick="exportPlan()">Export plan</button>
    </div>
  `;
}

function renderPlanner() {
  const day = state.day;
  const main = document.getElementById('main-content');
  const slots = DATA.slots[day];
  if (!slots || slots.length === 0) {
    main.innerHTML = renderPlannerSummary() + '<div class="no-films">No plannable screenings for this day.</div>';
    return;
  }
  let html = renderPlannerSummary();
  slots.forEach((sl, i) => {
    const picked = screeningById(day, pickedForSlot(day, sl, i));
    const anchorH = fmtTime(sl.anchor_start);
    const screenings = sl.screening_ids
      .map(id => screeningById(day, id))
      .filter(Boolean);
    const ranked = [...screenings].sort((a, b) => {
      if (a.id === picked.id) return -1;
      if (b.id === picked.id) return 1;
      return b.meta.score - a.meta.score;
    });
    const topN = ranked.slice(0, 6);
    const rest = ranked.slice(6);

    const optsHtml = topN.map(s => {
      const isMain = s.id === picked.id;
      const tagClass = sectionClass(s.meta.section_tag);
      const sectionLabel = DATA.section_label[s.meta.section_tag] || s.meta.section_tag;
      const scoreCls = scoreClass(s.meta.score);
      const optCls = ['option', s.is_gala ? 'gala' : '', isMain ? 'selected' : 'backup'].join(' ');
      return `
        <div class="${optCls}" onclick="selectOption(${i}, '${s.id}')" ondblclick="openModal('${s.id}')">
          <div class="radio-indicator"></div>
          <div class="opt-header">
            <div class="title">${escapeHtml(s.title)}</div>
            <div class="score-badge ${scoreCls}">${s.meta.score}</div>
          </div>
          <div class="director">${escapeHtml(s.meta.director || s.director || '')}</div>
          <div class="times">${s.start} – ${s.end}</div>
          <div class="meta-row">
            <span class="section-chip ${tagClass}">${sectionLabel}</span>
            <span>${s.venue}</span>
          </div>
          <div class="meta-row" style="margin-top: 6px;">
            <button onclick="event.stopPropagation(); openModal('${s.id}')"
              style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:11px;">details</button>
          </div>
        </div>
      `;
    }).join('');

    const overrideHtml = rest.length > 0 ? `
      <button class="override-toggle" onclick="document.getElementById('override-${i}').classList.toggle('open')">
        ↔ Custom override (${rest.length} more overlapping screenings)
      </button>
      <div id="override-${i}" class="override-panel">
        <h4>Pick any overlapping screening</h4>
        <select onchange="if(this.value) selectOption(${i}, this.value)">
          <option value="">-- choose a custom override --</option>
          ${rest.map(s => `
            <option value="${s.id}" ${s.id === picked.id ? 'selected' : ''}>
              ${s.start} · ${escapeHtml(s.title)} — ${escapeHtml(s.meta.director || s.director || '')} · ${DATA.section_label[s.meta.section_tag] || s.meta.section_tag} · score ${s.meta.score}
            </option>
          `).join('')}
        </select>
      </div>
    ` : '';

    html += `
      <div class="slot">
        <div class="slot-header">
          <div class="slot-time">${anchorH}</div>
          <div class="slot-main">
            ${escapeHtml(picked.title)}${picked.is_gala ? '<span class="gala-tag">GALA 🎩</span>' : ''}
          </div>
          <div class="slot-time-range">${picked.start} – ${picked.end} · ${picked.venue}</div>
        </div>
        <div class="slot-body">
          <div class="options-grid">${optsHtml}</div>
          ${overrideHtml}
        </div>
      </div>
    `;
  });
  main.innerHTML = html;
}

function selectOption(slotIndex, screeningId) {
  state.selection[slotKey(state.day, slotIndex)] = screeningId;
  persistSelection();
  renderPlanner();
}

function resetDaySelections() {
  const prefix = state.day + '#';
  for (const k of Object.keys(state.selection)) {
    if (k.startsWith(prefix)) delete state.selection[k];
  }
  persistSelection();
  renderPlanner();
}

function exportPlan() {
  const picks = allSelectedScreenings();
  const lines = [`# Daniel's Cannes 2026 Plan`, ''];
  let currentDay = null;
  for (const p of picks) {
    if (p.date !== currentDay) {
      currentDay = p.date;
      lines.push(`\n## ${fmtDateLong(p.date)}`);
    }
    const s = p.screening;
    lines.push(`- ${s.start}-${s.end} · **${s.title}** · ${s.meta.director} · ${DATA.section_label[s.meta.section_tag] || s.meta.section_tag} · ${s.venue}${s.is_gala ? ' · GALA 🎩' : ''}`);
  }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text)
    .then(() => alert('Plan copied to clipboard.\n\n' + text.slice(0, 500) + '...'))
    .catch(() => {
      const blob = new Blob([text], {type: 'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'cannes_2026_plan.md'; a.click();
    });
}

// ============ Summary tab =============
// ============ My Plan = Wishlist editor =============
//
// Source of truth: wishlist.json (committed via GitHub API). The planner
// remains a separate thinking tool; the wishlist is hand-curated here.
// On tab open we fetch the live wishlist; user edits stay in WISHLIST_DRAFT
// until they hit Save.

let WISHLIST_DRAFT = null;  // { byDate: { 'YYYY-MM-DD': [item, ...] } }
let WISHLIST_DIRTY = false;

async function fetchLiveWishlist() {
  // Use the GitHub Contents API (no CDN cache) so saves land instantly.
  const r = await fetch(
    `https://api.github.com/repos/${WISHLIST_REPO}/contents/${WISHLIST_PATH}?ref=${WISHLIST_BRANCH}&cb=${Date.now()}`,
    { headers: { 'Accept': 'application/vnd.github.raw' }, cache: 'no-store' }
  );
  if (r.status === 404) return { by_date: {} };
  if (!r.ok) throw new Error(`GET wishlist.json: HTTP ${r.status}`);
  return r.json();
}

function wishlistDraftAsByDate(blob) {
  // Normalise to multi-day shape regardless of legacy {date, screenings}.
  if (!blob) return {};
  if (blob.by_date) {
    return Object.fromEntries(
      Object.entries(blob.by_date).map(([d, v]) => [d, v.screenings || []])
    );
  }
  if (blob.date) return { [blob.date]: blob.screenings || [] };
  return {};
}

async function renderSummary() {
  document.getElementById('sub-nav').innerHTML = '';
  const main = document.getElementById('main-content');
  if (WISHLIST_DRAFT === null) {
    main.innerHTML = '<div class="summary"><div class="metric">Loading wishlist…</div></div>';
    try {
      const blob = await fetchLiveWishlist();
      WISHLIST_DRAFT = { byDate: wishlistDraftAsByDate(blob) };
      WISHLIST_DIRTY = false;
    } catch (e) {
      main.innerHTML = `<div class="summary"><div style="color:var(--bad);">
        Failed to load wishlist.json: ${escapeHtml(e.message)}</div></div>`;
      return;
    }
  }

  const byDay = WISHLIST_DRAFT.byDate;
  const total = Object.values(byDay).reduce((a, arr) => a + arr.length, 0);
  const galas = Object.values(byDay).flat().filter(it => it.grand_theatre_gala).length;

  // Show every festival day so the user can add/import even if a day is empty.
  const allDays = Array.from(new Set([
    ...Object.keys(byDay),
    ...Object.keys(DATA.schedule),
  ])).sort();

  let html = `
    <div class="summary">
      <div class="metric"><b>${total}</b><small>films in wishlist</small></div>
      <div class="metric"><b>${galas}</b><small>galas 🎩</small></div>
      <div class="metric"><b>${Object.keys(byDay).filter(d => byDay[d].length).length}</b><small>days covered</small></div>
      <div class="spacer"></div>
      <button onclick="exportPlan()">Export plan</button>
      <button onclick="openWishlistModal()" style="background: var(--accent); color: #0d0d10; border-color: var(--accent); font-weight: 700;">
        💾 Save wishlist${WISHLIST_DIRTY ? ' *' : ''}
      </button>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--muted);">
      Edit the wishlist directly here. The Firefox extension and Safari bookmarklet read this list at 7am. Per day: remove rows you don't want; paste a projection ID to add; or click "import planner picks" to seed from your Planner selections for that day. Changes are local until you hit Save.
    </div>
    <div class="summary-tab">
  `;

  for (const date of allDays) {
    const items = byDay[date] || [];
    const galaCount = items.filter(it => it.grand_theatre_gala).length;
    items.sort((a, b) => (a.start_minutes || 0) - (b.start_minutes || 0));

    html += `
      <div class="day-block">
        <div class="day-block-header">
          <div class="date-label">${fmtDateLong(date)}</div>
          <div class="day-stats">${items.length} films${galaCount ? ` · ${galaCount} galas 🎩` : ''}</div>
        </div>
    `;

    if (items.length === 0) {
      html += `<div style="padding:12px 18px;color:var(--muted);font-size:12px;">Nothing yet. Add by projection ID or import planner picks below.</div>`;
    } else {
      for (const it of items) {
        const sc = lookupSchedule(it.idproj);
        const score = sc ? sc.meta.score : it.score;
        const scoreCls = score != null ? scoreClass(score) : 's-low';
        const tagClass = sc ? sectionClass(sc.meta.section_tag) : 'Other';
        const sectionLabel = sc ? (DATA.section_label[sc.meta.section_tag] || sc.meta.section_tag) : '';
        html += `
          <div class="pick-row${it.grand_theatre_gala ? ' gala' : ''}">
            <div class="pt-time">${escapeHtml(it.start || '')}${sc && sc.end ? '–' + sc.end : ''}</div>
            <div class="pt-title" style="cursor:pointer;" onclick="openModalByIdproj('${escapeHtml(it.idproj)}')">
              ${escapeHtml(it.title || '(no title)')}${it.grand_theatre_gala ? ' 🎩' : ''}
              <div class="pt-director" style="font-family:monospace;color:var(--muted);font-size:11px;">${escapeHtml(it.idproj)} · ${escapeHtml(it.venue || '')}</div>
            </div>
            ${sc ? `<span class="section-chip ${tagClass}">${sectionLabel}</span>` : ''}
            ${score != null ? `<div class="score-badge ${scoreCls}" style="padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;background:var(--surface-2);">${score}</div>` : ''}
            <button onclick="wishlistRemove('${date}', '${escapeHtml(it.idproj)}')"
                    style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 9px;font-size:11px;border-radius:5px;margin-left:6px;">remove</button>
          </div>
        `;
      }
    }

    html += `
      <div style="padding:10px 18px;border-top:1px solid var(--border);background:var(--surface-2);">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="wladd-${date}" placeholder="paste idproj"
                 style="flex:1;min-width:200px;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:5px;font-size:13px;font-family:monospace;" />
          <button onclick="wishlistAdd('${date}')"
                  style="background:transparent;border:1px solid var(--accent);color:var(--accent);padding:5px 12px;font-size:12px;">+ add</button>
          <button onclick="wishlistImportPlanner('${date}')"
                  style="background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;font-size:12px;">import planner picks</button>
        </div>
        <div id="wladd-status-${date}" style="font-size:11px;margin-top:6px;color:var(--muted);"></div>
      </div>
    </div>
    `;
  }
  html += `</div>`;
  main.innerHTML = html;
}

// ---- helpers used by the wishlist editor ----

function lookupSchedule(idproj) {
  // Find the schedule.id corresponding to an idproj.
  const map = DATA.idproj_map || {};
  for (const [sid, v] of Object.entries(map)) {
    if (v.idproj === idproj) {
      // Find the full screening (with .meta) in DATA.schedule by id.
      for (const date of Object.keys(DATA.schedule)) {
        const sc = DATA.schedule[date].find(x => x.id === sid);
        if (sc) return sc;
      }
    }
  }
  return null;
}

function openModalByIdproj(idproj) {
  const sc = lookupSchedule(idproj);
  if (sc) openModal(sc.id);
}

function wishlistRemove(date, idproj) {
  const arr = WISHLIST_DRAFT.byDate[date] || [];
  WISHLIST_DRAFT.byDate[date] = arr.filter(x => x.idproj !== idproj);
  WISHLIST_DIRTY = true;
  renderSummary();
}

function wishlistAdd(date) {
  const inp = document.getElementById('wladd-' + date);
  const status = document.getElementById('wladd-status-' + date);
  const raw = (inp.value || '').trim();
  if (!raw) {
    status.textContent = 'paste a projection id first.';
    return;
  }
  // Normalise URL-encoded form (e.g. %3D -> =).
  const idproj = decodeURIComponent(raw);
  // Look up in idproj_map.
  const map = DATA.idproj_map || {};
  let found = null;
  for (const [sid, v] of Object.entries(map)) {
    if (v.idproj === idproj || v.idproj === raw) {
      found = { ...v, schedule_id: sid };
      break;
    }
  }
  if (!found) {
    status.innerHTML = `<span style="color:var(--bad);">not in idproj_map: <code>${escapeHtml(raw)}</code></span>`;
    return;
  }
  if (found.date !== date) {
    status.innerHTML = `<span style="color:var(--warn);">that idproj is for ${found.date}, not ${date}. Adding to its actual day.</span>`;
  }
  const targetDate = found.date;
  WISHLIST_DRAFT.byDate[targetDate] = WISHLIST_DRAFT.byDate[targetDate] || [];
  if (WISHLIST_DRAFT.byDate[targetDate].some(x => x.idproj === found.idproj)) {
    status.innerHTML = `<span style="color:var(--warn);">already in wishlist for ${targetDate}.</span>`;
    return;
  }
  WISHLIST_DRAFT.byDate[targetDate].push({
    idproj: found.idproj,
    title: found.title || '',
    start: found.start || '',
    venue: found.venue || '',
    score: found.score,
    grand_theatre_gala: !!found.grand_theatre_gala,
    start_minutes: found.start_minutes,
    end_minutes: found.end_minutes,
  });
  WISHLIST_DIRTY = true;
  renderSummary();
}

function wishlistImportPlanner(date) {
  const slots = DATA.slots[date] || [];
  if (slots.length === 0) {
    alert('No planner slots for ' + date);
    return;
  }
  const status = document.getElementById('wladd-status-' + date);
  let added = 0;
  WISHLIST_DRAFT.byDate[date] = WISHLIST_DRAFT.byDate[date] || [];
  const existing = new Set(WISHLIST_DRAFT.byDate[date].map(x => x.idproj));
  slots.forEach((sl, i) => {
    const id = pickedForSlot(date, sl, i);
    const sc = screeningById(date, id);
    if (!sc) return;
    const mapped = (DATA.idproj_map || {})[sc.id];
    if (!mapped) return;
    if (existing.has(mapped.idproj)) return;
    WISHLIST_DRAFT.byDate[date].push({
      idproj: mapped.idproj,
      title: sc.title,
      start: sc.start,
      venue: sc.venue,
      score: sc.meta.score,
      grand_theatre_gala: !!mapped.grand_theatre_gala,
      start_minutes: sc.start_minutes,
      end_minutes: sc.end_minutes,
    });
    existing.add(mapped.idproj);
    added += 1;
  });
  WISHLIST_DIRTY = true;
  renderSummary();
  // Show the count after re-render.
  setTimeout(() => {
    const s = document.getElementById('wladd-status-' + date);
    if (s) s.innerHTML = `<span style="color:var(--good);">imported ${added} planner pick${added === 1 ? '' : 's'}.</span>`;
  }, 50);
}

// ============ Competition tracker =============
function renderCompetition() {
  document.getElementById('sub-nav').innerHTML = '';
  // Find all competition films (unique by normalized title)
  const byTitle = {};
  for (const date of Object.keys(DATA.schedule)) {
    for (const s of DATA.schedule[date]) {
      if (s.meta.section_tag !== 'Competition') continue;
      const t = normTitle(s.title);
      if (!byTitle[t]) byTitle[t] = { screenings: [], meta: s.meta, title: s.title, director: s.meta.director || s.director };
      byTitle[t].screenings.push({ date, sc: s });
    }
  }
  // Check which are attended
  const attendedTitles = new Set(allSelectedScreenings().map(p => normTitle(p.screening.title)));
  const selectedMap = {};
  for (const p of allSelectedScreenings()) {
    selectedMap[normTitle(p.screening.title)] = { date: p.date, sc: p.screening };
  }
  const films = Object.values(byTitle).sort((a, b) => {
    const aGo = attendedTitles.has(normTitle(a.title)) ? 0 : 1;
    const bGo = attendedTitles.has(normTitle(b.title)) ? 0 : 1;
    if (aGo !== bGo) return aGo - bGo;
    return b.meta.score - a.meta.score;
  });

  const going = films.filter(f => attendedTitles.has(normTitle(f.title))).length;
  const total = films.length;

  let html = `
    <div class="summary">
      <div class="metric"><b>${going}/${total}</b><small>competition films</small></div>
      <div class="metric"><b>${Math.round(going/total*100)}%</b><small>coverage</small></div>
      <div class="spacer"></div>
    </div>
    <table class="comp-table">
      <thead>
        <tr>
          <th>Status</th>
          <th>Film</th>
          <th>Director</th>
          <th>Score</th>
          <th>Screening</th>
        </tr>
      </thead>
      <tbody>
  `;
  for (const f of films) {
    const isGoing = attendedTitles.has(normTitle(f.title));
    const sel = selectedMap[normTitle(f.title)];
    const screening = sel ? sel.sc : f.screenings[0].sc;
    const date = sel ? sel.date : f.screenings[0].date;
    const scoreCls = scoreClass(f.meta.score);
    html += `
      <tr class="${isGoing ? 'status-going' : 'status-missed'}" onclick="openModal('${screening.id}')" style="cursor:pointer;">
        <td>${isGoing
          ? '<span class="status-pill going">🎬 Going</span>'
          : '<span class="status-pill missed">— Skipping</span>'}</td>
        <td><b>${escapeHtml(f.title)}</b>${screening.is_gala && isGoing ? ' 🎩' : ''}</td>
        <td>${escapeHtml(f.director || '')}</td>
        <td><span class="score-badge ${scoreCls}" style="padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;">${f.meta.score}</span></td>
        <td>${isGoing
          ? `${fmtDate(date)} · ${screening.start} · ${screening.venue}`
          : `<span style="color:var(--muted);">${f.screenings.length} screening${f.screenings.length === 1 ? '' : 's'} available</span>`}</td>
      </tr>
    `;
  }
  html += `</tbody></table>`;
  document.getElementById('main-content').innerHTML = html;
}

// ============ Lookup tab =============
function renderLookup() {
  document.getElementById('sub-nav').innerHTML = '';
  // Build unique film list
  const byTitle = {};
  for (const date of Object.keys(DATA.schedule)) {
    for (const s of DATA.schedule[date]) {
      if (!s.plannable) continue;
      const t = normTitle(s.title);
      if (!t) continue;
      if (!byTitle[t]) byTitle[t] = { title: s.title, meta: s.meta, director: s.meta.director || s.director, screenings: [], section: s.meta.section_tag, firstId: s.id };
      byTitle[t].screenings.push({ date, sc: s });
    }
  }
  const q = state.lookup.toLowerCase().trim();
  const films = Object.values(byTitle).filter(f => {
    if (!q) return true;
    return (f.title.toLowerCase().includes(q)
      || (f.director || '').toLowerCase().includes(q)
      || (f.meta.tags || []).some(t => (t || '').toLowerCase().includes(q))
      || (f.meta.country || '').toLowerCase().includes(q)
      || f.section.toLowerCase().includes(q));
  }).sort((a, b) => b.meta.score - a.meta.score);

  const mainHtml = `
    <div class="lookup-search">
      <input id="lookup-input" type="text" placeholder="Search by title, director, tag, country or section..." value="${escapeHtml(state.lookup)}" autofocus />
    </div>
    <div style="margin-bottom:10px;color:var(--muted);font-size:12px;">
      ${films.length} film${films.length === 1 ? '' : 's'} ${q ? 'matched' : 'in the festival'}
    </div>
    ${films.length === 0
      ? '<div class="lookup-empty">No films match your search.</div>'
      : `<div class="lookup-results">${films.map(f => {
          const scoreCls = scoreClass(f.meta.score);
          const tagClass = sectionClass(f.meta.section_tag);
          const sectionLabel = DATA.section_label[f.meta.section_tag] || f.meta.section_tag;
          return `
            <div class="lookup-card" onclick="openModal('${f.firstId}')">
              <div class="lc-title">${escapeHtml(f.title)}</div>
              <div class="lc-director">${escapeHtml(f.director || '')} ${f.meta.country ? '· ' + f.meta.country : ''}${f.meta.runtime ? ' · ' + f.meta.runtime + 'min' : ''}</div>
              <div class="lc-meta">
                <span class="section-chip ${tagClass}">${sectionLabel}</span>
                <span class="score-badge ${scoreCls}" style="padding:2px 8px;border-radius:10px;font-size:12px;font-weight:700;">${f.meta.score}</span>
              </div>
              <div class="lc-screenings">
                <b>${f.screenings.length} screening${f.screenings.length === 1 ? '' : 's'}:</b> ${f.screenings.slice(0,3).map(scx => `${fmtDate(scx.date)} ${scx.sc.start}`).join(' · ')}${f.screenings.length > 3 ? ' · …' : ''}
              </div>
            </div>
          `;
        }).join('')}</div>`
    }
  `;
  document.getElementById('main-content').innerHTML = mainHtml;
  // Wire up the search input
  const inp = document.getElementById('lookup-input');
  if (inp) {
    inp.oninput = (e) => { state.lookup = e.target.value; renderLookup(); };
    // Keep focus
    setTimeout(() => {
      const len = inp.value.length;
      inp.focus();
      inp.setSelectionRange(len, len);
    }, 0);
  }
}

// ============ Modal (shared) =============
function openModal(screeningId) {
  // Search across all days for the screening with this id
  let s = null, sDate = null;
  for (const d of Object.keys(DATA.schedule)) {
    const found = DATA.schedule[d].find(x => x.id === screeningId);
    if (found) { s = found; sDate = d; break; }
  }
  if (!s) return;

  const normT = normTitle(s.title);
  const allScreenings = [];
  for (const date of Object.keys(DATA.schedule)) {
    for (const sc of DATA.schedule[date]) {
      if (normTitle(sc.title) === normT) {
        allScreenings.push({ date, sc });
      }
    }
  }
  allScreenings.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return (a.sc.start_minutes || 0) - (b.sc.start_minutes || 0);
  });

  // Find current selection for this title, if any
  const selected = allSelectedScreenings();
  const selectedForThis = selected.find(p => normTitle(p.screening.title) === normT);

  const modal = document.getElementById('modal-content');
  const tagClass = sectionClass(s.meta.section_tag);
  const sectionLabel = DATA.section_label[s.meta.section_tag] || s.meta.section_tag;
  modal.innerHTML = `
    <button class="close" onclick="document.getElementById('modal').classList.remove('open')">×</button>
    <h2>${escapeHtml(s.title)}</h2>
    <div class="director-line">${escapeHtml(s.meta.director || s.director || '')} · ${s.meta.country || ''} ${s.meta.runtime ? '· ' + s.meta.runtime + 'min' : ''}</div>
    <div class="chips">
      <span class="chip section-chip ${tagClass}" style="color:#0d0d10;font-weight:700">${sectionLabel}</span>

  return String(s || '').replace(/[&<>"']/g, c => ({

  })[c]);
}

function computeTargetDay() {
  // today+4 in Europe/Paris.
  const s = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Europe/Paris',
    year: 'numeric', month: '2-digit', day: '2-digit',
  }).format(new Date());
  const [y, m, d] = s.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + 4);
  return dt.toISOString().slice(0, 10);
}

async function putWishlist(payload, token, sha) {
  const body = {
    message: `chore: update wishlist for ${payload.date || "(all)"}`,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
    branch: WISHLIST_BRANCH,
  };
  if (sha) body.sha = sha;
  const r = await fetch(
    `https://api.github.com/repos/${WISHLIST_REPO}/contents/${WISHLIST_PATH}`,
    { method: 'PUT',
      headers: { 'Accept': 'application/vnd.github+json',
                 'Authorization': `Bearer ${token}`,
                 'Content-Type': 'application/json' },
      body: JSON.stringify(body) }
  );
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`PUT contents: HTTP ${r.status} — ${text.slice(0, 200)}`);
  }
  return r.json();
}

async function submitWishlist() {
  const token = document.getElementById('wl-token').value.trim();
  const statusEl = document.getElementById('wl-status');
  const btn = document.getElementById('wl-submit');

  if (!token) {
    statusEl.innerHTML = '<span style="color:var(--bad);">Enter a GitHub token first.</span>';
    return;
  }
  if (!WISHLIST_DRAFT) {
    statusEl.innerHTML = '<span style="color:var(--bad);">Wishlist not loaded.</span>';
    return;
  }

  // Build the canonical multi-day payload from WISHLIST_DRAFT.
  const nowIso = new Date().toISOString();
  const by_date = {};
  for (const [date, items] of Object.entries(WISHLIST_DRAFT.byDate)) {
    if (!items || items.length === 0) continue;
    by_date[date] = {
      generated_at: nowIso,
      screenings: items.map(it => ({
        idproj: it.idproj,
        title: it.title || '',
        start: it.start || '',
        venue: it.venue || '',
        score: it.score == null ? null : it.score,
        grand_theatre_gala: !!it.grand_theatre_gala,
      })),
    };
  }
  const payload = {
    updated_at: nowIso,
    source: 'dashboard',
    by_date,
  };

  btn.disabled = true;
  statusEl.innerHTML = '<span style="color:var(--muted);">Committing…</span>';
  try {
    const result = await commitWithRetry(
      fetchWishlistShaForCommit,
      (tok, sha) => putWishlist(payload, tok, sha),
      token,
      { onRetry: (attempt, delay) => {
          statusEl.innerHTML = `<span style="color:var(--muted);">SHA changed; retry ${attempt}/3 in ${delay}ms…</span>`;
        } }
    );
    localStorage.setItem('github_pat', token);
    WISHLIST_DIRTY = false;
    const commitSha = result?.commit?.sha?.slice(0, 7) || '?';
    const totalDays = Object.keys(by_date).length;
    statusEl.innerHTML = `<span style="color:var(--good);">
      ✅ Saved · commit ${commitSha} · ${totalDays} day${totalDays === 1 ? '' : 's'}.
      Firefox extension and Safari bookmarklet will see it on next click.
    </span>`;
  } catch (e) {
    statusEl.innerHTML = `<span style="color:var(--bad);">❌ ${escapeHtml(e.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

async function fetchWishlistShaForCommit(token) {
  const r = await fetch(
    `https://api.github.com/repos/${WISHLIST_REPO}/contents/${WISHLIST_PATH}?ref=${WISHLIST_BRANCH}`,
    { headers: { 'Accept': 'application/vnd.github+json',
                 'Authorization': `Bearer ${token}` } }
  );
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GET contents: HTTP ${r.status}`);
  return (await r.json()).sha;
}

// Generic 409-retry helper for the GitHub Contents API.
// Calls fetchSha() then putFn(sha). On HTTP 409 (sha mismatch — someone
// else committed in the meantime) it refetches and retries up to maxAttempts
// times with exponential backoff. Surfaces non-409 errors immediately.
async function commitWithRetry(fetchSha, putFn, token,
                               { maxAttempts = 4, baseDelayMs = 250,
                                 onRetry = null } = {}) {
  let lastErr = null;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    const sha = await fetchSha(token);
    try {
      return await putFn(token, sha);
    } catch (e) {
      lastErr = e;
      if (!/HTTP 409/.test(e.message) || attempt === maxAttempts) throw e;
      const delay = baseDelayMs * Math.pow(2, attempt - 1);
      if (onRetry) onRetry(attempt, delay);
      await new Promise(r => setTimeout(r, delay));
    }
  }
  throw lastErr;
}

const WATCHLIST_REPO = 'idaniar-web/cannes-2026';
const WATCHLIST_PATH = 'watchlist.json';

  `https://raw.githubusercontent.com/${WATCHLIST_REPO}/${WATCHLIST_BRANCH}/${WATCHLIST_PATH}`;

let WATCHLIST_STATE = null;

async function fetchLiveWatchlist() {
  // Use the GitHub API (always fresh) rather than raw.githubusercontent.com
  // (CDN-cached up to 5 min). The trade-off: API calls are rate-limited at
  // 60/hour for unauthenticated requests, more than enough for our usage.
  const r = await fetch(
    `https://api.github.com/repos/${WATCHLIST_REPO}/contents/${WATCHLIST_PATH}?ref=${WATCHLIST_BRANCH}&cb=${Date.now()}`,
    { headers: { 'Accept': 'application/vnd.github.raw' }, cache: 'no-store' }
  );
  if (!r.ok) throw new Error(`GET watchlist.json: HTTP ${r.status}`);
  return r.json();
}

async function fetchWatchlistSha(token) {
  const r = await fetch(
    `https://api.github.com/repos/${WATCHLIST_REPO}/contents/${WATCHLIST_PATH}?ref=${WATCHLIST_BRANCH}`,
    { headers: { 'Accept': 'application/vnd.github+json',
                 'Authorization': `Bearer ${token}` } }

async function putWatchlist(payload, token, sha) {

  const r = await fetch(

    { method: 'PUT',
      headers: { 'Accept': 'application/vnd.github+json',
                 'Authorization': `Bearer ${token}`,
                 'Content-Type': 'application/json' },
      body: JSON.stringify(body) }
  );
  if (!r.ok) {

    throw new Error(`PUT contents: HTTP ${r.status} — ${text.slice(0, 200)}`);
  }
  return r.json();

function findScreeningByIdproj(idproj) {
  // idproj_map.json is keyed by schedule_id, but we want to find by idproj.
  // The idproj input might be URL-encoded (%3D for '=') so try both forms.
  const map = DATA.idproj_map || {};
  const decoded = decodeURIComponent(idproj.trim());
  for (const [sid, v] of Object.entries(map)) {
    if (v.idproj === decoded || v.idproj === idproj.trim()) {
      return { ...v, schedule_id: sid };
    }
  }
  return null;
}

async function renderWatchlist(skipFetch = false) {
  document.getElementById('sub-nav').innerHTML = '';
  const main = document.getElementById('main-content');
  if (!skipFetch) {
    main.innerHTML = '<div class="summary"><div class="metric">Loading watchlist…</div></div>';

    let wl;
    try {
      wl = await fetchLiveWatchlist();
    } catch (e) {
      main.innerHTML = `<div class="summary"><div style="color:var(--bad);">
        Failed to load watchlist.json: ${escapeHtml(e.message)}</div></div>`;
      return;
    }
    WATCHLIST_STATE = {
      items: wl.items || [],
      updated_at: wl.updated_at || null,
    };
  }
  if (!WATCHLIST_STATE) {
    WATCHLIST_STATE = { items: [], updated_at: null };
  }

  // Date-window indicator: today..today+4 in Paris.
  const todayParis = (() => {
    const s = new Intl.DateTimeFormat('en-CA',
      { timeZone: 'Europe/Paris', year: 'numeric', month: '2-digit', day: '2-digit' }
    ).format(new Date());
    return s;  // YYYY-MM-DD
  })();
  function isInWindow(date) {
    return date >= todayParis && date <= addDays(todayParis, 4);
  }
  function addDays(date, n) {
    const d = new Date(date + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }

  let html = `
    <div class="summary">
      <div class="metric"><b>${WATCHLIST_STATE.items.length}</b><small>items watched</small></div>
      <div class="metric"><b>${WATCHLIST_STATE.items.filter(i => i.auto_book !== false).length}</b><small>auto-book on</small></div>
      <div class="metric"><b>${WATCHLIST_STATE.items.filter(i => isInWindow(i.date)).length}</b><small>in J−4 window</small></div>
      <div class="spacer"></div>
      <button onclick="openWatchlistSaveModal()"
              style="background:var(--accent);color:#0d0d10;font-weight:700;">💾 Save watchlist</button>
    </div>

    <div class="slot">
      <div class="slot-header"><div class="slot-main">Add screening</div></div>
      <div class="slot-body">
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="wlist-input" type="text" placeholder="paste idproj here (e.g. Jfu6YKcXhM4=)"
                 style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:4px;font-size:13px;font-family:monospace;" />
          <button onclick="wlistFetch()" class="ghost"
                  style="background:transparent;border:1px solid var(--accent);color:var(--accent);">🔍 Fetch</button>
        </div>
        <div id="wlist-preview" class="muted" style="margin-top:10px;font-size:12px;"></div>
      </div>
    </div>

    <div class="slot">
      <div class="slot-header"><div class="slot-main">Currently watching</div></div>
      <div class="slot-body">
  `;

  if (WATCHLIST_STATE.items.length === 0) {
    html += `<div class="no-films">No items on the watchlist. Add one above.</div>`;
  } else {
    const sortedItems = [...WATCHLIST_STATE.items].sort((a, b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return (a.start_minutes || 0) - (b.start_minutes || 0);
    });
    for (const it of sortedItems) {
      const inWindow = isInWindow(it.date);
      const warn = !inWindow
        ? `<span style="color:var(--warn);font-size:11px;margin-left:6px;">⚠ outside J−4 window (${it.date})</span>`
        : '';
      html += `
        <div class="option" style="padding:12px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="flex:1;">
              <div style="font-weight:600;font-size:14px;">
                ${it.grand_theatre_gala ? '🎭 ' : ''}${escapeHtml(it.title || '(unknown)')}${warn}
              </div>
              <div class="muted" style="font-size:12px;margin-top:2px;">
                ${it.date} · ${escapeHtml(it.start || '')} · ${escapeHtml(it.venue || '')}
              </div>
            </div>
            <button onclick="wlistRemove('${escapeHtml(it.idproj)}')"
                    style="background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 8px;">remove</button>
          </div>
          <div style="display:flex;gap:14px;margin-top:10px;font-size:12px;">
            <label style="display:flex;gap:5px;align-items:center;">
              <input type="checkbox" class="wlist-autobook" data-idproj="${escapeHtml(it.idproj)}"
                     ${it.auto_book !== false ? 'checked' : ''} />
              <span>auto-book</span>
            </label>
            <label style="display:flex;gap:5px;align-items:center;">
              <input type="checkbox" class="wlist-swap" data-idproj="${escapeHtml(it.idproj)}"
                     ${it.allow_swap !== false ? 'checked' : ''} />
              <span>allow swap</span>
            </label>
            <span style="color:var(--muted);font-size:11px;margin-left:auto;font-family:monospace;">${escapeHtml(it.idproj)}</span>
          </div>
        </div>
      `;
    }
  }
  html += `</div></div>`;
  main.innerHTML = html;

  // Wire toggles
  document.querySelectorAll('.wlist-autobook').forEach(cb => {
    cb.onchange = (e) => {
      const id = e.target.dataset.idproj;
      const it = WATCHLIST_STATE.items.find(x => x.idproj === id);
      if (it) it.auto_book = e.target.checked;
    };
  });
  document.querySelectorAll('.wlist-swap').forEach(cb => {
    cb.onchange = (e) => {
      const id = e.target.dataset.idproj;
      const it = WATCHLIST_STATE.items.find(x => x.idproj === id);
      if (it) it.allow_swap = e.target.checked;
    };
  });
  // Enter key in input field triggers fetch
  const inp = document.getElementById('wlist-input');
  if (inp) {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') wlistFetch();
    });
  }
}

function wlistFetch() {
  const raw = document.getElementById('wlist-input').value.trim();
  const previewEl = document.getElementById('wlist-preview');
  if (!raw) {
    previewEl.innerHTML = '<span style="color:var(--muted);">Paste an idproj first.</span>';
    return;
  }
  const sc = findScreeningByIdproj(raw);
  if (!sc) {
    previewEl.innerHTML = `<span style="color:var(--bad);">No match for "${escapeHtml(raw)}" in the database. Check the idproj exactly as it appears in the URL (e.g. <code>Jfu6YKcXhM4=</code>).</span>`;
    return;
  }
  // Already on watchlist?
  if (WATCHLIST_STATE.items.some(i => i.idproj === sc.idproj)) {
    previewEl.innerHTML = `<span style="color:var(--warn);">Already on the watchlist: <b>${escapeHtml(sc.title)}</b></span>`;
    return;
  }
  // Stash the candidate; click handler reads from this slot. Keeps the
  // (possibly apostrophe-containing) title out of the inline onclick HTML.
  window.__wlistPending = sc;
  previewEl.innerHTML = `
    <div style="background:var(--surface-2);padding:10px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <div>
        <div style="font-weight:600;font-size:13px;color:var(--text);">
          ${sc.grand_theatre_gala ? '🎭 ' : ''}${escapeHtml(sc.title)}
        </div>
        <div style="font-size:12px;margin-top:2px;">
          ${sc.date} · ${escapeHtml(sc.start)} · ${escapeHtml(sc.venue)}
          ${sc.score ? ` · score ${sc.score}` : ''}
        </div>
      </div>
      <button id="wlist-add-btn"
              style="background:var(--accent);color:#0d0d10;font-weight:700;">+ Add</button>
    </div>
  `;
  // Attach the listener directly — avoids any inline-attribute escaping headaches.
  document.getElementById('wlist-add-btn').addEventListener('click', () => {
    if (window.__wlistPending) {
      wlistAdd(window.__wlistPending);
      window.__wlistPending = null;
    }
  });
}

function wlistAdd(sc) {
  WATCHLIST_STATE.items.push({
    idproj: sc.idproj,
    title: sc.title,
    director: sc.director || '',
    date: sc.date,
    start: sc.start,
    end: sc.end,
    start_minutes: sc.start_minutes,
    end_minutes: sc.end_minutes,
    venue: sc.venue,
    is_gala: !!sc.is_gala,
    grand_theatre_gala: !!sc.grand_theatre_gala,
    score: sc.score,
    auto_book: true,
    allow_swap: true,
  });
  document.getElementById('wlist-input').value = '';
  document.getElementById('wlist-preview').innerHTML =
    `<span style="color:var(--good);">Added "<b>${escapeHtml(sc.title)}</b>". Click 💾 Save watchlist to commit.</span>`;
  renderWatchlist(true);
}

function wlistRemove(idproj) {
  WATCHLIST_STATE.items = WATCHLIST_STATE.items.filter(i => i.idproj !== idproj);
  renderWatchlist(true);
}

    <div class="director-line">
      Commits <code style="background:var(--surface-2);padding:2px 6px;border-radius:4px;">watchlist.json</code>
      to <b>${WATCHLIST_REPO}</b>. Lambda picks it up within ~60s.
    </div>
    <h4>What will be committed</h4>
    <pre style="background:var(--surface-2);padding:10px;border-radius:6px;font-size:11px;overflow-x:auto;max-height:240px;">${escapeHtml(JSON.stringify({
      updated_at: new Date().toISOString(),
      items: WATCHLIST_STATE.items,
    }, null, 2))}</pre>
    <h4>GitHub token</h4>
    <div style="display:flex;gap:6px;">
      <input id="wlist-token" type="password" placeholder="github_pat_..."
             style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px;border-radius:6px;font-size:13px;" />
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="document.getElementById('modal').classList.remove('open')" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);">Cancel</button>
      <button onclick="submitWatchlist()" id="wlist-submit" style="background:var(--accent);color:#0d0d10;font-weight:700;">Commit watchlist</button>
    </div>
    <div id="wlist-status" style="margin-top:10px;font-size:12px;"></div>
  `;
  document.getElementById('modal').classList.add('open');
  const savedTok = localStorage.getItem('github_pat');
  if (savedTok) document.getElementById('wlist-token').value = savedTok;
}

async function submitWatchlist() {
  const token = document.getElementById('wlist-token').value.trim();
  const btn = document.getElementById('wlist-submit');
  const statusEl = document.getElementById('wlist-status');
  if (!token) {
    statusEl.innerHTML = '<span style="color:var(--bad);">Enter a token first.</span>';
    return;
  }
  const payload = {
    updated_at: new Date().toISOString(),
    items: WATCHLIST_STATE.items,
  };
  btn.disabled = true;
  statusEl.innerHTML = '<span style="color:var(--muted);">Committing…</span>';
  try {
    const result = await commitWithRetry(
      fetchWatchlistSha,
      (tok, sha) => putWatchlist(payload, tok, sha),
      token,
      { onRetry: (attempt, delay) => {
          statusEl.innerHTML = `<span style="color:var(--muted);">SHA changed; retry ${attempt}/3 in ${delay}ms…</span>`;
        } }
    );
    localStorage.setItem('github_pat', token);
    const commitSha = result?.commit?.sha?.slice(0, 7) || '?';
    statusEl.innerHTML = `<span style="color:var(--good);">
      ✅ Saved · commit ${commitSha} · ${WATCHLIST_STATE.items.length} item${WATCHLIST_STATE.items.length === 1 ? '' : 's'}.
    </span>`;
    setTimeout(() => {
      document.getElementById('modal').classList.remove('open');
      renderWatchlist();
    }, 1000);
  } catch (e) {
    statusEl.innerHTML = `<span style="color:var(--bad);">❌ ${escapeHtml(e.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}

// ============ Control panel =============
const CONFIG_REPO = 'idaniar-web/cannes-2026';
const CONFIG_PATH = 'config.json';
const CONFIG_BRANCH = 'main';
const CONFIG_RAW_URL =
  `https://raw.githubusercontent.com/${CONFIG_REPO}/${CONFIG_BRANCH}/${CONFIG_PATH}`;

async function fetchLiveConfig() {
  const r = await fetch(
    `https://api.github.com/repos/${CONFIG_REPO}/contents/${CONFIG_PATH}?ref=${CONFIG_BRANCH}&cb=${Date.now()}`,
    { headers: { 'Accept': 'application/vnd.github.raw' }, cache: 'no-store' }
  );
  if (!r.ok) throw new Error(`GET config.json: HTTP ${r.status}`);
  return r.json();
}

async function fetchConfigSha(token) {
  const r = await fetch(
    `https://api.github.com/repos/${CONFIG_REPO}/contents/${CONFIG_PATH}?ref=${CONFIG_BRANCH}`,
    { headers: { 'Accept': 'application/vnd.github+json',
                 'Authorization': `Bearer ${token}` } }
  );
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GET contents: HTTP ${r.status}`);
  return (await r.json()).sha;
}

async function putConfig(payload, token, sha) {
  const body = {
    message: 'chore: update watcher config',
    content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2)))),
    branch: CONFIG_BRANCH,
  };
  if (sha) body.sha = sha;
  const r = await fetch(
    `https://api.github.com/repos/${CONFIG_REPO}/contents/${CONFIG_PATH}`,
    { method: 'PUT',
      headers: { 'Accept': 'application/vnd.github+json',
                 'Authorization': `Bearer ${token}`,
                 'Content-Type': 'application/json' },
      body: JSON.stringify(body) }
  );
  if (!r.ok) {
    const text = await r.text();
    throw new Error(`PUT contents: HTTP ${r.status} — ${text.slice(0, 200)}`);
  }
  return r.json();
}

let CONTROL_STATE = null;

async function renderControl() {
  document.getElementById('sub-nav').innerHTML = '';
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="summary"><div class="metric">Loading config…</div></div>';

  let cfg;
  try {
    cfg = await fetchLiveConfig();
  } catch (e) {
    main.innerHTML = `<div class="summary"><div style="color:var(--bad);">
      Failed to load config.json from ${CONFIG_REPO}: ${escapeHtml(e.message)}</div></div>`;
    return;
  }
  // Normalise defaults.
  cfg.notify_score ??= 7.0;
  cfg.auto_book_enabled ??= true;
  cfg.auto_book_denylist ??= [];
  cfg.auto_book_allowlist_extra ??= [];
  cfg.silence_notifications ??= [];
  CONTROL_STATE = cfg;

  const idprojMap = DATA.idproj_map || {};
  const galas = Object.values(idprojMap).filter(v => v.grand_theatre_gala)
    .sort((a, b) => (a.date + a.start).localeCompare(b.date + b.start));

  const isDenied = (id) => cfg.auto_book_denylist.includes(id);
  const isSilenced = (id) => cfg.silence_notifications.includes(id);
  const isExtraAllowed = (id) => cfg.auto_book_allowlist_extra.includes(id);

  let html = `
    <div class="summary">
      <div class="metric">
        <b>${cfg.notify_score.toFixed(1)}</b><small>notify threshold</small>
      </div>
      <div class="metric">
        <b style="color:${cfg.auto_book_enabled ? 'var(--good)' : 'var(--bad)'};">
          ${cfg.auto_book_enabled ? 'ON' : 'OFF'}</b>
        <small>auto-book master</small>
      </div>
      <div class="metric"><b>${cfg.auto_book_denylist.length}</b><small>on denylist</small></div>
      <div class="metric"><b>${cfg.silence_notifications.length}</b><small>silenced</small></div>
      <div class="spacer"></div>
      <button onclick="openControlSaveModal()"
              style="background:var(--accent);color:#0d0d10;font-weight:700;">💾 Save config</button>
    </div>

    <div class="slot">
      <div class="slot-header"><div class="slot-main">Thresholds & master switch</div></div>
      <div class="slot-body">
        <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
          <label style="display:flex;gap:10px;align-items:center;">
            <span>Notify threshold (push score ≥)</span>
            <input id="cp-notify-score" type="number" step="0.5" min="0" max="10"
                   value="${cfg.notify_score}"
                   style="width:70px;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:13px;" />
          </label>
          <label style="display:flex;gap:10px;align-items:center;">
            <input id="cp-auto-book" type="checkbox" ${cfg.auto_book_enabled ? 'checked' : ''} />
            <span>Auto-book enabled (master switch)</span>
          </label>
        </div>
        <div class="muted" style="margin-top:8px;font-size:11px;">
          Master switch off = no screening is ever auto-booked regardless of individual rules. Use if you want to temporarily pause bookings.
        </div>
      </div>
    </div>

    <div class="slot">
      <div class="slot-header">
        <div class="slot-main">Galas (auto-booked by default)</div>
      </div>
      <div class="slot-body">
        <div class="muted" style="margin-bottom:10px;font-size:12px;">
          Denylist prevents auto-booking and leaves the opening as a manual push (if not silenced).
          Useful after a test: cancel the ticket, deny the idproj, avoid a re-book.
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:8px;">
  `;
  for (const g of galas) {
    html += `
      <div class="option ${isDenied(g.idproj) ? '' : 'selected'}" style="padding:10px;">
        <div style="font-weight:600;font-size:13px;">
          ${g.grand_theatre_gala ? '🎭 ' : ''}${escapeHtml(g.title || '(untitled)')}
        </div>
        <div class="muted" style="font-size:11px;margin-bottom:6px;">
          ${g.date} · ${escapeHtml(g.start || '')} · ${escapeHtml(g.venue || '')}
          ${g.score ? ` · score ${g.score}` : ''}
        </div>
        <div style="display:flex;gap:12px;font-size:11px;">
          <label style="display:flex;gap:4px;align-items:center;">
            <input type="checkbox" class="cp-deny" data-idproj="${g.idproj}"
                   ${isDenied(g.idproj) ? 'checked' : ''} />
            <span>deny auto-book</span>
          </label>
          <label style="display:flex;gap:4px;align-items:center;">
            <input type="checkbox" class="cp-silence" data-idproj="${g.idproj}"
                   ${isSilenced(g.idproj) ? 'checked' : ''} />
            <span>silence push</span>
          </label>
        </div>
      </div>
    `;
  }
  html += `</div></div></div>`;

  // Extra auto-book list (non-gala idprojs).
  if (cfg.auto_book_allowlist_extra.length > 0) {
    html += `
      <div class="slot">
        <div class="slot-header"><div class="slot-main">Extra auto-book (non-gala)</div></div>
        <div class="slot-body">
    `;
    for (const id of cfg.auto_book_allowlist_extra) {
      const ev = Object.values(idprojMap).find(v => v.idproj === id);
      const label = ev ? `${ev.title} · ${ev.date} ${ev.start}` : '(unknown)';
      html += `
        <div class="option" style="padding:10px;display:flex;gap:10px;align-items:center;">
          <div style="flex:1;">${escapeHtml(label)}</div>
          <button onclick="cpRemoveExtra('${escapeHtml(id)}')"
                  style="background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;">
            remove
          </button>
        </div>
      `;
    }
    html += `</div></div>`;
  }

  html += `
    <div class="slot">
      <div class="slot-header"><div class="slot-main">Add extra auto-book</div></div>
      <div class="slot-body">
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="cp-extra-input" type="text" placeholder="idproj or title substring..."
                 style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-size:13px;" />
          <button onclick="cpAddExtra()" class="ghost"
                  style="background:transparent;border:1px solid var(--accent);color:var(--accent);">+ add</button>
        </div>
        <div id="cp-extra-status" class="muted" style="margin-top:6px;font-size:11px;"></div>
      </div>
    </div>
  `;

  main.innerHTML = html;

  // Wire up checkbox change handlers (memory-only; committed on Save).
  document.getElementById('cp-notify-score').oninput = (e) => {
    CONTROL_STATE.notify_score = parseFloat(e.target.value) || 7.0;
  };
  document.getElementById('cp-auto-book').onchange = (e) => {
    CONTROL_STATE.auto_book_enabled = e.target.checked;
  };
  document.querySelectorAll('.cp-deny').forEach(cb => {
    cb.onchange = (e) => {
      const id = e.target.dataset.idproj;
      const set = new Set(CONTROL_STATE.auto_book_denylist);
      if (e.target.checked) set.add(id); else set.delete(id);
      CONTROL_STATE.auto_book_denylist = [...set];
    };
  });
  document.querySelectorAll('.cp-silence').forEach(cb => {
    cb.onchange = (e) => {
      const id = e.target.dataset.idproj;
      const set = new Set(CONTROL_STATE.silence_notifications);
      if (e.target.checked) set.add(id); else set.delete(id);
      CONTROL_STATE.silence_notifications = [...set];
    };
  });
}

function cpRemoveExtra(idproj) {
  CONTROL_STATE.auto_book_allowlist_extra =
    CONTROL_STATE.auto_book_allowlist_extra.filter(x => x !== idproj);
  renderControl();
}

function cpAddExtra() {
  const raw = document.getElementById('cp-extra-input').value.trim();
  if (!raw) return;
  const map = DATA.idproj_map || {};
  let hit = Object.values(map).find(v => v.idproj === raw);
  if (!hit) {
    const needle = raw.toUpperCase();
    hit = Object.values(map).find(v =>
      v.title && v.title.toUpperCase().includes(needle));
  }
  const statusEl = document.getElementById('cp-extra-status');
  if (!hit) {
    statusEl.innerHTML = `<span style="color:var(--bad);">No match for "${escapeHtml(raw)}"</span>`;
    return;
  }
  if (!CONTROL_STATE.auto_book_allowlist_extra.includes(hit.idproj)) {
    CONTROL_STATE.auto_book_allowlist_extra.push(hit.idproj);
  }
  renderControl();
}

function openControlSaveModal() {
  const cfg = CONTROL_STATE;
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `
    <button class="close" onclick="document.getElementById('modal').classList.remove('open')">×</button>
    <h2>💾 Save control config</h2>
    <div class="director-line">
      Commits <code style="background:var(--surface-2);padding:2px 6px;border-radius:4px;">config.json</code>
      to <b>${CONFIG_REPO}</b>.
      Lambda re-reads it within ~60 seconds of the commit.
    </div>
    <h4>What will be committed</h4>
    <pre style="background:var(--surface-2);padding:10px;border-radius:6px;font-size:11px;overflow-x:auto;max-height:220px;">${escapeHtml(JSON.stringify(cfg, null, 2))}</pre>
    <h4>GitHub token <span style="text-transform:none;color:var(--muted);letter-spacing:0;">(needs Contents: R/W on ${CONFIG_REPO})</span></h4>
    <div style="display:flex;gap:6px;">
      <input id="ctl-token" type="password" placeholder="github_pat_..."
             style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px;border-radius:6px;font-size:13px;" />
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="document.getElementById('modal').classList.remove('open')" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);">Cancel</button>
      <button onclick="submitControl()" id="ctl-submit" style="background:var(--accent);color:#0d0d10;font-weight:700;">Commit config</button>
    </div>
    <div id="ctl-status" style="margin-top:10px;font-size:12px;"></div>
  `;
  document.getElementById('modal').classList.add('open');

  const savedTok = localStorage.getItem('github_pat');
  if (savedTok) document.getElementById('ctl-token').value = savedTok;
}

async function submitControl() {
  const token = document.getElementById('ctl-token').value.trim();
  const btn = document.getElementById('ctl-submit');
  const statusEl = document.getElementById('ctl-status');
  if (!token) {
    statusEl.innerHTML = '<span style="color:var(--bad);">Enter a token first.</span>';
    return;
  }
  btn.disabled = true;
  statusEl.innerHTML = '<span style="color:var(--muted);">Committing…</span>';
  try {
    const result = await commitWithRetry(
      fetchConfigSha,
      (tok, sha) => putConfig(CONTROL_STATE, tok, sha),
      token,
      { onRetry: (attempt, delay) => {
          statusEl.innerHTML = `<span style="color:var(--muted);">SHA changed; retry ${attempt}/3 in ${delay}ms…</span>`;
        } }
    );
    localStorage.setItem('github_pat', token);
    const commitSha = result?.commit?.sha?.slice(0, 7) || '?';
    statusEl.innerHTML = `<span style="color:var(--good);">
      ✅ Saved · commit ${commitSha}. Lambda will pick up within ~60s.
    </span>`;
    // Re-fetch and re-render so the summary header reflects the saved
    // values (raw.githubusercontent.com is CDN-cached, so add a cache-bust).
    setTimeout(() => {
      document.getElementById('modal').classList.remove('open');
      renderControl();
    }, 1000);
  } catch (e) {
    statusEl.innerHTML = `<span style="color:var(--bad);">❌ ${escapeHtml(e.message)}</span>`;
  } finally {
    btn.disabled = false;
  }
}
